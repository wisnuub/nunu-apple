name: Build Launcher

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'launcher/**'
      - '.github/workflows/build-launcher.yml'
  pull_request:
    paths:
      - 'launcher/**'

jobs:
  build:
    name: Build NunuVM
    runs-on: macos-14  # Apple Silicon runner

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build (release)
        working-directory: launcher
        run: swift build -c release

      - name: Sign binary
        working-directory: launcher
        env:
          CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -n "$CERT_BASE64" ]; then
            echo "Signing with Developer ID certificate..."
            KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
            security create-keychain -p "" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "" $KEYCHAIN_PATH
            echo "$CERT_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
            security import $RUNNER_TEMP/cert.p12 \
              -k $KEYCHAIN_PATH \
              -P "$CERT_PASSWORD" \
              -A -T /usr/bin/codesign
            security list-keychain -d user -s $KEYCHAIN_PATH
            security set-key-partition-list \
              -S apple-tool:,apple: -s -k "" $KEYCHAIN_PATH
            ./build.sh --release --sign
          else
            echo "No signing certificate configured — using ad-hoc signature"
            ./build.sh --release
          fi

      - name: Verify entitlements
        working-directory: launcher
        run: |
          codesign -d --entitlements - .build/release/NunuVM 2>/dev/null
          codesign --verify --verbose .build/release/NunuVM

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nunu-vm-macos-arm64
          path: launcher/.build/release/NunuVM
          retention-days: 30

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/') && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: launcher/.build/release/NunuVM
          generate_release_notes: true
